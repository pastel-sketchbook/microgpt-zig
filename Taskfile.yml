version: "3"
env:
  PGM_NAME: microgpt-zig
tasks:
  build:
    desc: Build the project
    cmds:
      - zig build

  build:release:
    desc: Build in release mode
    cmds:
      - zig build -Doptimize=ReleaseFast

  run:
    desc: Build and run
    cmds:
      - zig build run

  run:release:
    desc: Build and run in release mode
    cmds:
      - zig build run -Doptimize=ReleaseFast

  demo:
    desc: Train on element-annotated saju four-pillar data and generate new pillars
    cmds:
      - echo "=== microgpt-zig demo (사주/四柱 + 오행/五行) ==="
      - echo "Training a 1-layer, 32-dim GPT on element-annotated Hanja data for 1000 steps..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast

  demo:names:
    desc: Train on English names dataset and generate new names
    cmds:
      - echo "=== microgpt-zig demo (English names) ==="
      - echo "Training a 1-layer, 32-dim GPT on character-level names for 1000 steps..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/input.txt

  demo:pillars:
    desc: Train on plain saju four-pillar data (no elements)
    cmds:
      - echo "=== microgpt-zig demo (사주/四柱 pillars only) ==="
      - echo "Training on plain Hanja four-pillar data for 1000 steps..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/saju_pillars.txt

  demo:korean:
    desc: Train on Korean (Hangul) names and generate new ones
    cmds:
      - echo "=== microgpt-zig demo (Korean/한국어) ==="
      - echo "Training a 1-layer, 32-dim GPT on Hangul names for 1000 steps..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/korean_names.txt

  demo:complete:
    desc: Complete a partial saju from a given prefix (default 壬申)
    cmds:
      - echo "=== microgpt-zig conditional generation ==="
      - echo "Completing from prefix {{.PREFIX}}..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/saju_pillars_elements.txt {{.PREFIX}}
    vars:
      PREFIX: '{{.PREFIX | default "壬申"}}'

  demo:gunghap:
    desc: Train on pair compatibility (궁합) data and classify pairs
    cmds:
      - echo "=== microgpt-zig demo (궁합/宮合 pair compatibility) ==="
      - echo "Training a 1-layer, 32-dim GPT on gunghap data for 1000 steps..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/saju_gunghap.txt

  demo:gunghap:classify:
    desc: Classify a saju pair (provide two 8-char pillars separated by |)
    cmds:
      - echo "=== microgpt-zig gunghap classification ==="
      - echo "Classifying pair {{.PAIR}}..."
      - echo ""
      - zig build run -Doptimize=ReleaseFast -- data/saju_gunghap.txt {{.PAIR}}
    vars:
      PAIR: '{{.PAIR | default "壬申庚戌癸酉乙卯|甲子丙寅戊辰庚午"}}'

  test:
    desc: Run tests
    cmds:
      - zig build test

  bench:
    desc: Benchmark (3 runs, best wall time, ReleaseFast)
    deps: [build:release]
    cmds:
      - ./scripts/bench.sh

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf zig-out .zig-cache

  loc:
    desc: Count lines of code
    cmds:
      - tokei
